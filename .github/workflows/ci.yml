name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          LOG_LEVEL: WARNING
        run: python -m unittest discover -s tests -p "test_app.py" -v

  redis-integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Redis integration tests
        env:
          LOG_LEVEL: WARNING
          REDIS_URL: redis://localhost:6379/0
          RUN_REDIS_INTEGRATION: "1"
        run: python -m unittest discover -s tests -p "test_redis_integration.py" -v
