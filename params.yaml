data_ingestion:
  dataset_name: "youtube_comment_sentiment"
  local_data_path: "data/external/youtube_comments_labeled.csv"
  data_url: "https://raw.githubusercontent.com/Himanshu-1703/reddit-sentiment-analysis/refs/heads/main/data/reddit.csv"
  text_column: "clean_comment"
  label_column: "category"
  label_mapping:
    negative: 0
    neutral: 1
    positive: 2
  test_size: 0.20
  random_state: 42

model_building:
  ngram_range: [1, 3]  
  max_features: 1000
  validation_size: 0.20
  candidate_models: ["logistic_regression", "linear_svc", "lightgbm"]
  learning_rate: 0.09
  max_depth: 20
  n_estimators: 367

model_evaluation:
  baseline_report_path: "reports/model/baseline_metrics.json"
  promotion_thresholds:
    required_macro_f1_gain: 0.0
    max_recall_regression: 0.01

data_quality:
  min_total_labeled_rows: 1000
  min_examples_per_class: 200
